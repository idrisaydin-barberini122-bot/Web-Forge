<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Web Forge IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --editor-bg: #1e1e1e;
            --ui-bg: #2d2d2d;
            --accent: #3b82f6;
        }
        body { background-color: #121212; color: #e0e0e0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .guiding-hand-active iframe {
            cursor: crosshair !important;
        }

        #editor-textarea {
            font-family: 'Fira Code', 'Courier New', monospace;
            scrollbar-width: thin;
            scrollbar-color: #444 #1e1e1e;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Modal backdrop */
        #modal-overlay {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
        }

        /* Toggle Button States */
        .btn-active {
            background-color: #16a34a !important; /* Green-600 */
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .pane-hidden {
            display: none !important;
        }
        .pane-full {
            width: 100% !important;
        }
    </style>
</head>
<body>

    <!-- Header / Toolbar -->
    <header class="h-14 bg-[#2d2d2d] border-b border-white/10 flex items-center justify-between px-4 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg">
                <i class="fas fa-code-branch text-white"></i>
            </div>
            <h1 class="font-bold tracking-tight hidden md:block">GEMINI <span class="text-blue-400">FORGE</span></h1>
        </div>

        <div class="flex items-center gap-2">
            <!-- View Toggles -->
            <div class="flex bg-zinc-800 rounded-md p-1 mr-2 hidden md:flex">
                <button id="toggle-editor" class="px-3 py-1 text-xs rounded bg-zinc-700 text-white font-bold transition-all">Code</button>
                <button id="toggle-split" class="px-3 py-1 text-xs rounded text-zinc-400 hover:text-white transition-all">Split</button>
                <button id="toggle-preview" class="px-3 py-1 text-xs rounded text-zinc-400 hover:text-white transition-all">View</button>
            </div>

            <button id="btn-guiding-hand" class="flex items-center gap-2 bg-zinc-700 hover:bg-zinc-600 px-3 py-1.5 rounded-md transition-all text-sm">
                <i class="fas fa-hand-pointer"></i>
                <span class="hidden sm:inline">Guiding Hand</span>
            </button>
            <button id="btn-ai-assist" class="flex items-center gap-2 bg-purple-600 hover:bg-purple-500 px-3 py-1.5 rounded-md transition-all text-sm font-medium">
                <i class="fas fa-robot"></i>
                <span class="hidden sm:inline">Ask AI</span>
            </button>
            <div class="w-px h-6 bg-white/10 mx-1"></div>
            <button id="btn-deploy" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 px-4 py-1.5 rounded-md transition-all text-sm font-bold shadow-lg">
                <i class="fab fa-github"></i>
                <span>Deploy</span>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main id="workspace" class="flex-1 flex overflow-hidden">
        
        <!-- Editor Section -->
        <div id="editor-pane" class="w-1/2 flex flex-col border-r border-white/10 transition-all duration-300">
            <div class="bg-[#252526] px-4 py-1 text-xs text-zinc-400 flex justify-between items-center">
                <span>index.html</span>
                <span id="char-count">0 chars</span>
            </div>
            <textarea id="editor-textarea" spellcheck="false" class="flex-1 w-full bg-[#1e1e1e] text-[#d4d4d4] p-4 outline-none resize-none text-sm leading-relaxed" placeholder="<!-- Start building your optimized website here... -->"></textarea>
        </div>

        <!-- Preview Section -->
        <div id="preview-pane" class="w-1/2 flex flex-col bg-white transition-all duration-300">
            <div class="bg-[#252526] px-4 py-1 text-xs text-zinc-400 flex items-center gap-2 border-b border-white/10">
                <i class="fas fa-globe text-[10px]"></i>
                <span>Live View</span>
            </div>
            <div class="flex-1 relative bg-white">
                <iframe id="preview-frame" class="w-full h-full"></iframe>
                <div id="inspector-overlay" class="absolute inset-0 pointer-events-none border-2 border-blue-500 hidden"></div>
            </div>
        </div>
    </main>

    <!-- UI Modals -->
    <div id="modal-overlay" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <!-- AI Modal -->
        <div id="ai-modal" class="bg-[#2d2d2d] w-full max-w-xl rounded-xl shadow-2xl border border-white/10 hidden p-6">
            <div class="flex items-center gap-3 mb-4">
                <i class="fas fa-magic text-purple-400 text-xl"></i>
                <h2 class="text-xl font-bold">Gemini AI Assistant</h2>
            </div>
            <p class="text-zinc-400 text-sm mb-4">Describe the component or fix you need (e.g., "Create a dark mode hero section with Tailwind").</p>
            <textarea id="ai-prompt" class="w-full h-32 bg-[#1e1e1e] rounded-lg border border-white/10 p-3 text-sm focus:border-purple-500 outline-none mb-4" placeholder="What should I build for you?"></textarea>
            <div class="flex justify-end gap-3">
                <button onclick="closeModals()" class="px-4 py-2 text-sm hover:text-white transition-colors">Cancel</button>
                <button id="ai-generate-btn" class="bg-purple-600 hover:bg-purple-500 px-6 py-2 rounded-lg text-sm font-bold flex items-center gap-2">
                    <span id="ai-btn-text">Generate Code</span>
                </button>
            </div>
        </div>

        <!-- GitHub Modal -->
        <div id="github-modal" class="bg-[#2d2d2d] w-full max-w-md rounded-xl shadow-2xl border border-white/10 hidden p-6">
            <div class="flex items-center gap-3 mb-4 text-blue-400">
                <i class="fab fa-github text-2xl"></i>
                <h2 class="text-xl font-bold text-white">GitHub Deployment</h2>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs uppercase text-zinc-500 font-bold mb-1">Personal Access Token</label>
                    <input type="password" id="gh-token" class="w-full bg-[#1e1e1e] border border-white/10 rounded px-3 py-2 text-sm focus:border-blue-500 outline-none" placeholder="ghp_xxxxxxxxxxxx">
                </div>
                <div>
                    <label class="block text-xs uppercase text-zinc-500 font-bold mb-1">Repository (User/Repo)</label>
                    <input type="text" id="gh-repo" class="w-full bg-[#1e1e1e] border border-white/10 rounded px-3 py-2 text-sm focus:border-blue-500 outline-none" placeholder="username/my-site">
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <button onclick="closeModals()" class="px-4 py-2 text-sm hover:text-white transition-colors">Cancel</button>
                    <button id="gh-commit-btn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-lg text-sm font-bold">Push to Main</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        const apiKey = ""; // Provided by env
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'web-forge-1.0';

        const editor = document.getElementById('editor-textarea');
        const preview = document.getElementById('preview-frame');
        const guidingHandBtn = document.getElementById('btn-guiding-hand');
        const aiBtn = document.getElementById('btn-ai-assist');
        const deployBtn = document.getElementById('btn-deploy');
        const modalOverlay = document.getElementById('modal-overlay');
        
        const editorPane = document.getElementById('editor-pane');
        const previewPane = document.getElementById('preview-pane');
        
        let isGuidingHand = false;

        // --- Core: Live Preview ---
        function updatePreview() {
            const html = editor.value;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            preview.src = url;
            document.getElementById('char-count').innerText = `${html.length} chars`;
        }

        editor.addEventListener('input', updatePreview);

        // --- View Toggles ---
        document.getElementById('toggle-editor').onclick = (e) => {
            updateViewButtons(e.target);
            editorPane.className = "flex-1 flex flex-col border-r border-white/10 pane-full";
            previewPane.className = "pane-hidden";
        };
        document.getElementById('toggle-split').onclick = (e) => {
            updateViewButtons(e.target);
            editorPane.className = "w-1/2 flex flex-col border-r border-white/10";
            previewPane.className = "w-1/2 flex flex-col bg-white";
        };
        document.getElementById('toggle-preview').onclick = (e) => {
            updateViewButtons(e.target);
            editorPane.className = "pane-hidden";
            previewPane.className = "flex-1 flex flex-col bg-white pane-full";
        };

        function updateViewButtons(activeBtn) {
            document.querySelectorAll('#toggle-editor, #toggle-split, #toggle-preview').forEach(btn => {
                btn.classList.remove('bg-zinc-700', 'text-white', 'font-bold');
                btn.classList.add('text-zinc-400');
            });
            activeBtn.classList.add('bg-zinc-700', 'text-white', 'font-bold');
            activeBtn.classList.remove('text-zinc-400');
        }

        // --- Guiding Hand: Visual Inspector ---
        guidingHandBtn.addEventListener('click', () => {
            isGuidingHand = !isGuidingHand;
            guidingHandBtn.classList.toggle('btn-active', isGuidingHand);
            
            if (isGuidingHand) {
                injectInspector();
            } else {
                // To turn it off, we MUST refresh the preview to remove event listeners and styles
                updatePreview();
            }
        });

        function injectInspector() {
            const inspectorScript = `
                <script>
                    (function() {
                        const style = document.createElement('style');
                        style.innerHTML = '*:hover { outline: 2px solid #3b82f6 !important; cursor: crosshair !important; }';
                        document.head.appendChild(style);

                        document.addEventListener('click', (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            const tag = e.target.tagName;
                            const action = prompt(\`Visual Editor [\${tag}]:\\n1. Edit Text\\n2. Change BG Color\\n3. Delete\\n4. Cancel\`);
                            
                            if(action === '1') {
                                const newText = prompt("New text content:", e.target.innerText);
                                if(newText !== null) e.target.innerText = newText;
                            } else if(action === '2') {
                                const color = prompt("Color (hex or name):", "#ffffff");
                                if(color) e.target.style.backgroundColor = color;
                            } else if(action === '3') {
                                e.target.remove();
                            }
                            
                            window.parent.postMessage({ 
                                type: 'SYNC_HTML', 
                                html: document.documentElement.outerHTML 
                            }, '*');
                        }, true);
                    })();
                <\/script>
            `;
            const currentHTML = editor.value;
            const doc = preview.contentDocument || preview.contentWindow.document;
            doc.open();
            doc.write(currentHTML + inspectorScript);
            doc.close();
        }

        window.addEventListener('message', (event) => {
            if (event.data.type === 'SYNC_HTML') {
                // Remove the injected script tag before saving back to editor
                let cleaned = event.data.html.replace(/<script>(.|\s)*?<\/script>/g, '');
                editor.value = cleaned;
                document.getElementById('char-count').innerText = `${cleaned.length} chars`;
            }
        });

        // --- AI Architect: Gemini Integration ---
        aiBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('hidden');
            document.getElementById('ai-modal').classList.remove('hidden');
        });

        document.getElementById('ai-generate-btn').addEventListener('click', async () => {
            const promptInput = document.getElementById('ai-prompt').value;
            if(!promptInput) return;

            const btnText = document.getElementById('ai-btn-text');
            btnText.innerHTML = '<span class="loader"></span> Thinking...';
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `You are an expert web developer. Generate ONLY the HTML/CSS code for: ${promptInput}. Use Tailwind CSS via CDN where possible. Provide only the code, no explanation.` }] }]
                    })
                });

                const data = await response.json();
                const aiCode = data.candidates[0].content.parts[0].text.replace(/```html|```/g, '').trim();
                
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                const text = editor.value;
                editor.value = text.substring(0, start) + aiCode + text.substring(end);
                
                updatePreview();
                closeModals();
            } catch (err) {
                console.error(err);
                alert("AI failed to generate.");
            } finally {
                btnText.innerText = 'Generate Code';
            }
        });

        // --- GitHub: Deployment ---
        deployBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('hidden');
            document.getElementById('github-modal').classList.remove('hidden');
        });

        document.getElementById('gh-commit-btn').addEventListener('click', async () => {
            const token = document.getElementById('gh-token').value;
            const repo = document.getElementById('gh-repo').value;
            if(!token || !repo) return alert("Fill in token and repo.");

            const content = btoa(unescape(encodeURIComponent(editor.value)));
            
            try {
                let sha = "";
                const getRes = await fetch(`https://api.github.com/repos/${repo}/contents/index.html`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if(getRes.ok) {
                    const data = await getRes.json();
                    sha = data.sha;
                }

                const putRes = await fetch(`https://api.github.com/repos/${repo}/contents/index.html`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Update from Gemini Web Forge",
                        content: content,
                        sha: sha || undefined
                    })
                });

                if(putRes.ok) {
                    alert("Successfully deployed to GitHub!");
                    closeModals();
                } else {
                    const errData = await putRes.json();
                    alert("Error: " + errData.message);
                }
            } catch (err) {
                alert("Deployment failed.");
            }
        });

        window.closeModals = function() {
            modalOverlay.classList.add('hidden');
            document.getElementById('ai-modal').classList.add('hidden');
            document.getElementById('github-modal').classList.add('hidden');
        }

        // Initial state
        editor.value = `<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"><\/script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">
    <div class="text-center p-8 bg-white rounded-2xl shadow-xl max-w-md">
        <h1 class="text-4xl font-black text-blue-600 mb-4">Hello World</h1>
        <p class="text-gray-600 mb-6 leading-relaxed">
            This is your new project. Use the <strong>Guiding Hand</strong> to edit visually or 
            <strong>Ask AI</strong> to build sections instantly.
        </p>
        <button class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:scale-105 transition-transform">
            Get Started
        </button>
    </div>
</body>
</html>`;
        updatePreview();

    </script>
</body>
</html>
